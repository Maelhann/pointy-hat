name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm install

      - name: Build binaries
        run: bun run build.ts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pointyhat-darwin-arm64
            dist/pointyhat-darwin-x64
            dist/pointyhat-linux-arm64
            dist/pointyhat-linux-x64
            dist/pointyhat-win-x64.exe
            scripts/install.sh
